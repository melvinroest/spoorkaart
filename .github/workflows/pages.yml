name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Extra build-time assets from a separate private repo, injected only
      # while the repo variable DEPLOY_ASSETS is 'true'; flip the variable
      # and re-run the workflow to build without them.
      - uses: actions/checkout@v4
        if: vars.DEPLOY_ASSETS == 'true'
        with:
          repository: melvinroest/sk-assets
          ssh-key: ${{ secrets.ASSETS_SSH_KEY }}
          path: map
      # the checkout's own .git dir would otherwise be copied into the
      # served build via app/public/map
      - run: rm -rf map/.git
        if: vars.DEPLOY_ASSETS == 'true'
      # map/ is not part of this repo; the empty dir keeps the
      # app/public/map symlink from dangling during the build. The app
      # detects a missing map and serves the geo view only.
      - run: mkdir -p map
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npm run build
        working-directory: app
        env:
          BASE_PATH: /spoorkaart/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
